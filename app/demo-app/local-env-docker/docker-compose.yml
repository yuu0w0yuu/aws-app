services:
  db:
    image: postgres:16-alpine
    container_name: demo-app-local-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sandbox_app
    restart: always

volumes:
  postgres_data:
